---
name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...

  acceptance:
    runs-on: ubuntu-latest
    needs: build
    # Acceptance tests start a local KMS (SQLite, no auth) and run real KMIP calls.
    # They require Docker to pull the cosmian/kms image.
    env:
      TF_ACC: '1'
      COSMIAN_KMS_SERVER_URL: http://localhost:9998
    strategy:
      fail-fast: false
      matrix:
        include:
          - kms_variant: fips
            kms_image: ghcr.io/cosmian/kms-fips:latest
          - kms_variant: non-fips
            kms_image: ghcr.io/cosmian/kms:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull KMS image (${{ matrix.kms_variant }})
        run: docker pull ${{ matrix.kms_image }}

      - name: Start KMS server (${{ matrix.kms_variant }})
        run: |
          docker run -d --name kms \
            -p 9998:9998 \
            ${{ matrix.kms_image }}
          # Wait for KMS to be ready — image already pulled, so 60s is for startup only
          # KMS returns HTTP 422 on empty KMIP request (not 200) — use -s not -sf
          timeout 60 bash -c 'until curl -s http://localhost:9998/kmip/2_1 -X POST -H "Content-Type: application/json" -d "{}" 2>/dev/null | grep -q .; do sleep 2; done'

      - name: Run acceptance tests
        run: go test -v -timeout 120s ./internal/...

      - name: Stop KMS server
        if: always()
        run: docker rm -f kms || true
